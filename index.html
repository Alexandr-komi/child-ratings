<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оценки для Паши</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 30px;
            padding: 30px 20px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .child-name {
            font-size: 48px;
            font-weight: bold;
            color: #764ba2;
            margin-top: 5px;
        }
        
        .counters {
            display: flex;
            justify-content: space-around;
            margin: 30px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 20px;
        }
        
        .counter-item {
            text-align: center;
        }
        
        .counter-emoji {
            font-size: 48px;
        }
        
        .counter-number {
            font-size: 54px;
            font-weight: 800;
        }
        
        .star-number {
            color: #fbbf24;
        }
        
        .snowflake-number {
            color: #38bdf8;
        }
        
        .counter-label {
            font-size: 16px;
            color: #64748b;
        }
        
        /* Кнопки оценок */
        .buttons {
            display: flex;
            gap: 15px;
            margin: 25px 0;
        }
        
        .btn {
            flex: 1;
            padding: 25px;
            font-size: 64px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        .btn-star {
            background: linear-gradient(145deg, #fef9c3, #fde047);
        }
        
        .btn-snowflake {
            background: linear-gradient(145deg, #e0f2fe, #bae6fd);
        }
        
        /* Пароль (появляется при нажатии) */
        .password-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .password-modal {
            background: white;
            padding: 30px;
            border-radius: 30px;
            width: 90%;
            max-width: 350px;
            text-align: center;
        }
        
        .password-modal h3 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .password-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }
        
        .password-digit {
            width: 60px;
            height: 70px;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            border: 3px solid #e2e8f0;
            border-radius: 15px;
            background: white;
        }
        
        .password-digit:focus {
            border-color: #764ba2;
            outline: none;
        }
        
        .password-error {
            color: #ef4444;
            margin: 10px 0;
            min-height: 24px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .modal-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .modal-btn.cancel {
            background: #e2e8f0;
            color: #64748b;
        }
        
        .modal-btn.submit {
            background: #764ba2;
            color: white;
        }
        
        .modal-btn.submit:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
        }
        
        /* История */
        .history-section {
            background: #f8fafc;
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .history-title {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        
        .history-title h2 {
            color: #334155;
            font-size: 18px;
        }
        
        .history-list {
            list-style: none;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .history-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: white;
            border-radius: 12px;
            margin-bottom: 8px;
        }
        
        .history-emoji {
            font-size: 28px;
        }
        
        .history-time {
            color: #94a3b8;
            font-size: 13px;
            margin-left: auto;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
        }
        
        .reset-btn {
            background: none;
            border: 2px solid #e2e8f0;
            padding: 10px 25px;
            border-radius: 50px;
            color: #64748b;
            cursor: pointer;
        }
        
        .empty-history {
            text-align: center;
            color: #94a3b8;
            padding: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌟 Оценки для</h1>
            <div class="child-name">Паши</div>
        </div>
        
        <!-- Счетчики -->
        <div class="counters">
            <div class="counter-item">
                <div class="counter-emoji">⭐</div>
                <div class="counter-number star-number" id="starCount">0</div>
                <div class="counter-label">звездочек</div>
            </div>
            <div class="counter-item">
                <div class="counter-emoji">❄️</div>
                <div class="counter-number snowflake-number" id="snowflakeCount">0</div>
                <div class="counter-label">снежинок</div>
            </div>
        </div>
        
        <!-- Кнопки оценок -->
        <div class="buttons">
            <button class="btn btn-star" onclick="showPasswordModal('star')">⭐</button>
            <button class="btn btn-snowflake" onclick="showPasswordModal('snowflake')">❄️</button>
        </div>
        
        <!-- Модальное окно с паролем -->
        <div class="password-overlay" id="passwordModal">
            <div class="password-modal">
                <h3 id="modalTitle">⭐ Звездочка</h3>
                <div class="password-inputs">
                    <input type="text" class="password-digit" id="digit1" maxlength="1" pattern="\d" inputmode="numeric" onkeyup="moveToNext(this, 'digit2')">
                    <input type="text" class="password-digit" id="digit2" maxlength="1" pattern="\d" inputmode="numeric" onkeyup="moveToNext(this, 'digit3')">
                    <input type="text" class="password-digit" id="digit3" maxlength="1" pattern="\d" inputmode="numeric" onkeyup="moveToNext(this, 'digit4')">
                    <input type="text" class="password-digit" id="digit4" maxlength="1" pattern="\d" inputmode="numeric" onkeyup="checkPassword(this)">
                </div>
                <div class="password-error" id="passwordError"></div>
                <div class="modal-buttons">
                    <button class="modal-btn cancel" onclick="hidePasswordModal()">Отмена</button>
                    <button class="modal-btn submit" id="submitBtn" onclick="submitPassword()" disabled>Поставить</button>
                </div>
            </div>
        </div>
        
        <!-- История -->
        <div class="history-section">
            <div class="history-title">
                <h2>📋 История</h2>
                <span id="totalCount">0 всего</span>
            </div>
            <div class="history-list" id="historyList"></div>
        </div>
        
        <div class="footer">
            <button class="reset-btn" onclick="resetData()">🔄 Сбросить всё</button>
        </div>
    </div>

    <script>
        // НАСТРОЙКИ
        const PARENT_PASSWORD = "1234"; // 4-значный пароль
        const STORAGE_KEY = 'pasha_ratings';
        
        let ratings = [];
        let selectedType = null; // 'star' или 'snowflake'
        
        // Загрузка данных
        function init() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    ratings = JSON.parse(saved);
                } catch (e) {
                    ratings = [];
                }
            }
            updateDisplay();
        }
        
        // Показать окно пароля
        function showPasswordModal(type) {
            selectedType = type;
            document.getElementById('modalTitle').innerHTML = type === 'star' ? '⭐ Звездочка' : '❄️ Снежинка';
            document.getElementById('passwordModal').style.display = 'flex';
            document.getElementById('digit1').focus();
            clearPassword();
        }
        
        // Скрыть окно пароля
        function hidePasswordModal() {
            document.getElementById('passwordModal').style.display = 'none';
            clearPassword();
        }
        
        // Очистить поля пароля
        function clearPassword() {
            for (let i = 1; i <= 4; i++) {
                document.getElementById(`digit${i}`).value = '';
            }
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('passwordError').textContent = '';
        }
        
        // Переход к следующему полю
        function moveToNext(current, nextId) {
            if (current.value.length === 1) {
                const next = document.getElementById(nextId);
                if (next) next.focus();
            }
            checkDigitsFilled();
        }
        
        // Проверка заполнения всех цифр
        function checkDigitsFilled() {
            const d1 = document.getElementById('digit1').value;
            const d2 = document.getElementById('digit2').value;
            const d3 = document.getElementById('digit3').value;
            const d4 = document.getElementById('digit4').value;
            
            document.getElementById('submitBtn').disabled = !(d1 && d2 && d3 && d4);
        }
        
        // Проверка пароля (при вводе последней цифры)
        function checkPassword(lastInput) {
            moveToNext(lastInput, null);
            checkDigitsFilled();
            
            // Автоматическая отправка при вводе последней цифры
            const d1 = document.getElementById('digit1').value;
            const d2 = document.getElementById('digit2').value;
            const d3 = document.getElementById('digit3').value;
            const d4 = document.getElementById('digit4').value;
            
            if (d1 && d2 && d3 && d4) {
                setTimeout(() => submitPassword(), 100);
            }
        }
        
        // Отправка пароля
        function submitPassword() {
            const d1 = document.getElementById('digit1').value;
            const d2 = document.getElementById('digit2').value;
            const d3 = document.getElementById('digit3').value;
            const d4 = document.getElementById('digit4').value;
            
            const enteredPassword = d1 + d2 + d3 + d4;
            
            if (enteredPassword === PARENT_PASSWORD) {
                // Правильный пароль - ставим оценку
                addRating(selectedType);
                hidePasswordModal();
            } else {
                // Неправильный пароль
                document.getElementById('passwordError').textContent = 'Неверный пароль';
                clearPassword();
                document.getElementById('digit1').focus();
            }
        }
        
        // Добавление оценки
        function addRating(type) {
            const newRating = {
                type: type,
                timestamp: new Date().toISOString(),
                id: Date.now()
            };
            
            ratings.push(newRating);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(ratings));
            updateDisplay();
            
            // Вибрация если есть
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(10);
            }
        }
        
        // Обновление экрана
        function updateDisplay() {
            const starCount = ratings.filter(r => r.type === 'star').length;
            const snowflakeCount = ratings.filter(r => r.type === 'snowflake').length;
            
            document.getElementById('starCount').textContent = starCount;
            document.getElementById('snowflakeCount').textContent = snowflakeCount;
            document.getElementById('totalCount').textContent = ratings.length + ' всего';
            
            // История
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '';
            
            if (ratings.length === 0) {
                historyList.innerHTML = '<div class="empty-history">✨ Пока нет оценок</div>';
                return;
            }
            
            [...ratings].reverse().slice(0, 30).forEach(rating => {
                const date = new Date(rating.timestamp);
                const timeStr = date.toLocaleString('ru', { 
                    hour: '2-digit', 
                    minute: '2-digit',
                    day: 'numeric',
                    month: 'short'
                });
                
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `
                    <span class="history-emoji">${rating.type === 'star' ? '⭐' : '❄️'}</span>
                    <span>${rating.type === 'star' ? 'Звездочка' : 'Снежинка'}</span>
                    <span class="history-time">${timeStr}</span>
                `;
                historyList.appendChild(item);
            });
        }
        
        // Сброс данных
        function resetData() {
            if (confirm('Удалить все оценки?')) {
                ratings = [];
                localStorage.removeItem(STORAGE_KEY);
                updateDisplay();
            }
        }
        
        // Закрытие модалки по клику на фон
        document.getElementById('passwordModal').addEventListener('click', function(e) {
            if (e.target === this) {
                hidePasswordModal();
            }
        });
        
        // Запуск
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
