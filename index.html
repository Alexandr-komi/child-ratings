<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оценки для Паши</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 30px;
            padding: 30px 20px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .child-name {
            font-size: 48px;
            font-weight: bold;
            color: #764ba2;
            margin-top: 5px;
        }
        
        .conversion-rule {
            background: #f0f9ff;
            color: #0369a1;
            padding: 10px;
            border-radius: 50px;
            font-size: 16px;
            margin: 10px 0;
            text-align: center;
            border: 2px dashed #38bdf8;
        }
        
        .counters {
            display: flex;
            justify-content: space-around;
            margin: 30px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 20px;
        }
        
        .counter-item {
            text-align: center;
            position: relative;
        }
        
        .counter-emoji {
            font-size: 48px;
        }
        
        .counter-number {
            font-size: 54px;
            font-weight: 800;
        }
        
        .star-number {
            color: #fbbf24;
        }
        
        .snowflake-number {
            color: #38bdf8;
        }
        
        .counter-label {
            font-size: 16px;
            color: #64748b;
        }
        
        .progress-bar {
            position: absolute;
            bottom: -10px;
            left: 0;
            right: 0;
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: #38bdf8;
            width: 0%;
            transition: width 0.3s;
        }
        
        .buttons {
            display: flex;
            gap: 15px;
            margin: 25px 0;
        }
        
        .btn {
            flex: 1;
            padding: 25px;
            font-size: 64px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        .btn-star {
            background: linear-gradient(145deg, #fef9c3, #fde047);
        }
        
        .btn-snowflake {
            background: linear-gradient(145deg, #e0f2fe, #bae6fd);
        }
        
        /* Модальное окно */
        .password-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .password-modal {
            background: white;
            padding: 30px;
            border-radius: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        
        .password-modal h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }
        
        .password-modal p {
            color: #64748b;
            margin-bottom: 20px;
            font-size: 16px;
        }
        
        /* Поле для примечания */
        .note-input {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 3px solid #e2e8f0;
            border-radius: 15px;
            margin-bottom: 20px;
            resize: none;
            font-family: inherit;
        }
        
        .note-input:focus {
            border-color: #764ba2;
            outline: none;
        }
        
        .password-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }
        
        .password-digit {
            width: 60px;
            height: 70px;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            border: 3px solid #e2e8f0;
            border-radius: 15px;
            background: white;
        }
        
        .password-digit:focus {
            border-color: #764ba2;
            outline: none;
        }
        
        .password-error {
            color: #ef4444;
            margin: 10px 0;
            min-height: 24px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .modal-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .modal-btn.cancel {
            background: #e2e8f0;
            color: #64748b;
        }
        
        .modal-btn.submit {
            background: #764ba2;
            color: white;
        }
        
        .modal-btn.submit:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
        }
        
        .modal-btn.danger {
            background: #ef4444;
            color: white;
        }
        
        /* История */
        .history-section {
            background: #f8fafc;
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .history-title {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        
        .history-title h2 {
            color: #334155;
            font-size: 18px;
        }
        
        .history-list {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .history-item {
            background: white;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            animation: slideIn 0.3s;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .history-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        
        .history-emoji {
            font-size: 24px;
        }
        
        .history-type {
            font-weight: 600;
            color: #334155;
        }
        
        .history-conversion {
            background: #fbbf24;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .history-time {
            color: #94a3b8;
            font-size: 12px;
            margin-left: auto;
        }
        
        .history-note {
            background: #f1f5f9;
            padding: 10px;
            border-radius: 10px;
            color: #475569;
            font-size: 14px;
            margin-top: 5px;
            border-left: 4px solid #94a3b8;
        }
        
        .history-note::before {
            content: "📝 ";
            opacity: 0.7;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
        }
        
        .reset-btn {
            background: none;
            border: 2px solid #e2e8f0;
            padding: 10px 25px;
            border-radius: 50px;
            color: #64748b;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
        }
        
        .reset-btn:hover {
            background: #fee2e2;
            border-color: #ef4444;
            color: #ef4444;
        }
        
        .empty-history {
            text-align: center;
            color: #94a3b8;
            padding: 30px;
        }
        
        .info-text {
            color: #94a3b8;
            font-size: 14px;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌟 Оценки для</h1>
            <div class="child-name">Паши</div>
        </div>
        
        <div class="conversion-rule">
            ❄️❄️❄️❄️❄️ = ⭐ (5 снежинок = 1 звезда)
        </div>
        
        <!-- Счетчики -->
        <div class="counters">
            <div class="counter-item">
                <div class="counter-emoji">⭐</div>
                <div class="counter-number star-number" id="starCount">0</div>
                <div class="counter-label">звездочек</div>
            </div>
            <div class="counter-item">
                <div class="counter-emoji">❄️</div>
                <div class="counter-number snowflake-number" id="snowflakeCount">0</div>
                <div class="counter-label">снежинок</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="snowflakeProgress"></div>
                </div>
            </div>
        </div>
        
        <!-- Кнопки оценок -->
        <div class="buttons">
            <button class="btn btn-star" onclick="showRatingModal('star')">⭐</button>
            <button class="btn btn-snowflake" onclick="showRatingModal('snowflake')">❄️</button>
        </div>
        
        <!-- Кнопка сброса -->
        <div style="text-align: center; margin: 15px 0;">
            <button class="reset-btn" onclick="showResetModal()">🔄 Сбросить все оценки</button>
        </div>
        
        <!-- История -->
        <div class="history-section">
            <div class="history-title">
                <h2>📋 История с примечаниями</h2>
                <span id="totalCount">0 всего</span>
            </div>
            <div class="history-list" id="historyList"></div>
        </div>
        
        <div class="info-text">
            🔒 Все изменения только с паролем
        </div>
    </div>

    <!-- Модальное окно для оценки -->
    <div class="password-overlay" id="ratingModal">
        <div class="password-modal">
            <h3 id="modalTitle">⭐ Звездочка</h3>
            <p id="modalDescription">Напишите, за что оценка</p>
            
            <!-- Только поле для ввода, без подсказок -->
            <textarea class="note-input" id="ratingNote" placeholder="Например: помыл посуду, сделал уроки..." rows="3"></textarea>
            
            <div class="password-inputs">
                <input type="text" class="password-digit" id="digit1" maxlength="1" pattern="\d" inputmode="numeric" onkeyup="moveToNext(this, 'digit2')">
                <input type="text" class="password-digit" id="digit2" maxlength="1" pattern="\d" inputmode="numeric" onkeyup="moveToNext(this, 'digit3')">
                <input type="text" class="password-digit" id="digit3" maxlength="1" pattern="\d" inputmode="numeric" onkeyup="moveToNext(this, 'digit4')">
                <input type="text" class="password-digit" id="digit4" maxlength="1" pattern="\d" inputmode="numeric" onkeyup="checkPassword(this)">
            </div>
            <div class="password-error" id="passwordError"></div>
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="hideRatingModal()">Отмена</button>
                <button class="modal-btn submit" id="submitBtn" onclick="submitRating()" disabled>Поставить</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно для сброса -->
    <div class="password-overlay" id="resetModal">
        <div class="password-modal">
            <h3>⚠️ Сброс всех оценок</h3>
            <p>Введите пароль для подтверждения</p>
            
            <div class="password-inputs">
                <input type="text" class="password-digit" id="resetDigit1" maxlength="1" pattern="\d" inputmode="numeric" onkeyup="moveToNextReset(this, 'resetDigit2')">
                <input type="text" class="password-digit" id="resetDigit2" maxlength="1" pattern="\d" inputmode="numeric" onkeyup="moveToNextReset(this, 'resetDigit3')">
                <input type="text" class="password-digit" id="resetDigit3" maxlength="1" pattern="\d" inputmode="numeric" onkeyup="moveToNextReset(this, 'resetDigit4')">
                <input type="text" class="password-digit" id="resetDigit4" maxlength="1" pattern="\d" inputmode="numeric" onkeyup="checkResetPassword(this)">
            </div>
            <div class="password-error" id="resetPasswordError"></div>
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="hideResetModal()">Отмена</button>
                <button class="modal-btn danger" id="resetSubmitBtn" onclick="submitReset()" disabled>Сбросить всё</button>
            </div>
        </div>
    </div>

    <script>
        // НАСТРОЙКИ
        const PARENT_PASSWORD = "1234";
        const STORAGE_KEY = 'pasha_ratings_clean';
        const SNOWFLAKES_TO_STAR = 5;
        
        let ratings = [];
        let currentRatingType = null;
        
        // Загрузка данных
        function init() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    ratings = JSON.parse(saved);
                } catch (e) {
                    ratings = [];
                }
            }
            updateDisplay();
        }
        
        // Показать окно для оценки
        function showRatingModal(type) {
            currentRatingType = type;
            
            document.getElementById('modalTitle').innerHTML = type === 'star' ? '⭐ Звездочка' : '❄️ Снежинка';
            document.getElementById('modalDescription').innerHTML = type === 'star' ? 'За что хвалим?' : 'За что замечание?';
            
            // Очищаем поле ввода
            document.getElementById('ratingNote').value = '';
            
            // Очищаем пароль
            for (let i = 1; i <= 4; i++) {
                document.getElementById(`digit${i}`).value = '';
            }
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('passwordError').textContent = '';
            
            document.getElementById('ratingModal').style.display = 'flex';
            document.getElementById('digit1').focus();
        }
        
        // Скрыть окно оценки
        function hideRatingModal() {
            document.getElementById('ratingModal').style.display = 'none';
            currentRatingType = null;
        }
        
        // Показать окно сброса
        function showResetModal() {
            for (let i = 1; i <= 4; i++) {
                document.getElementById(`resetDigit${i}`).value = '';
            }
            document.getElementById('resetSubmitBtn').disabled = true;
            document.getElementById('resetPasswordError').textContent = '';
            document.getElementById('resetModal').style.display = 'flex';
            document.getElementById('resetDigit1').focus();
        }
        
        // Скрыть окно сброса
        function hideResetModal() {
            document.getElementById('resetModal').style.display = 'none';
        }
        
        // Переход к следующему полю (оценка)
        function moveToNext(current, nextId) {
            if (current.value.length === 1) {
                const next = document.getElementById(nextId);
                if (next) next.focus();
            }
            checkDigitsFilled();
        }
        
        // Переход к следующему полю (сброс)
        function moveToNextReset(current, nextId) {
            if (current.value.length === 1) {
                const next = document.getElementById(nextId);
                if (next) next.focus();
            }
            checkResetDigitsFilled();
        }
        
        // Проверка заполнения цифр (оценка)
        function checkDigitsFilled() {
            const d1 = document.getElementById('digit1').value;
            const d2 = document.getElementById('digit2').value;
            const d3 = document.getElementById('digit3').value;
            const d4 = document.getElementById('digit4').value;
            
            document.getElementById('submitBtn').disabled = !(d1 && d2 && d3 && d4);
        }
        
        // Проверка заполнения цифр (сброс)
        function checkResetDigitsFilled() {
            const d1 = document.getElementById('resetDigit1').value;
            const d2 = document.getElementById('resetDigit2').value;
            const d3 = document.getElementById('resetDigit3').value;
            const d4 = document.getElementById('resetDigit4').value;
            
            document.getElementById('resetSubmitBtn').disabled = !(d1 && d2 && d3 && d4);
        }
        
        // Проверка пароля (оценка)
        function checkPassword(lastInput) {
            moveToNext(lastInput, null);
            checkDigitsFilled();
            
            const d1 = document.getElementById('digit1').value;
            const d2 = document.getElementById('digit2').value;
            const d3 = document.getElementById('digit3').value;
            const d4 = document.getElementById('digit4').value;
            
            if (d1 && d2 && d3 && d4) {
                setTimeout(() => submitRating(), 100);
            }
        }
        
        // Проверка пароля (сброс)
        function checkResetPassword(lastInput) {
            moveToNextReset(lastInput, null);
            checkResetDigitsFilled();
            
            const d1 = document.getElementById('resetDigit1').value;
            const d2 = document.getElementById('resetDigit2').value;
            const d3 = document.getElementById('resetDigit3').value;
            const d4 = document.getElementById('resetDigit4').value;
            
            if (d1 && d2 && d3 && d4) {
                setTimeout(() => submitReset(), 100);
            }
        }
        
        // Отправка оценки
        function submitRating() {
            const d1 = document.getElementById('digit1').value;
            const d2 = document.getElementById('digit2').value;
            const d3 = document.getElementById('digit3').value;
            const d4 = document.getElementById('digit4').value;
            
            const enteredPassword = d1 + d2 + d3 + d4;
            
            if (enteredPassword === PARENT_PASSWORD) {
                // Получаем примечание (можно оставить пустым)
                const note = document.getElementById('ratingNote').value.trim();
                
                // Добавляем оценку
                const newRating = {
                    type: currentRatingType,
                    note: note || (currentRatingType === 'star' ? '⭐' : '❄️'),
                    timestamp: new Date().toISOString(),
                    id: Date.now()
                };
                
                ratings.push(newRating);
                
                // Проверяем конвертацию
                checkAndConvertSnowflakes();
                
                // Сохраняем
                localStorage.setItem(STORAGE_KEY, JSON.stringify(ratings));
                
                // Обновляем экран
                updateDisplay();
                
                hideRatingModal();
                
                // Вибрация
                if (window.navigator && window.navigator.vibrate) {
                    window.navigator.vibrate(10);
                }
            } else {
                document.getElementById('passwordError').textContent = 'Неверный пароль';
                for (let i = 1; i <= 4; i++) {
                    document.getElementById(`digit${i}`).value = '';
                }
                document.getElementById('digit1').focus();
            }
        }
        
        // Отправка сброса
        function submitReset() {
            const d1 = document.getElementById('resetDigit1').value;
            const d2 = document.getElementById('resetDigit2').value;
            const d3 = document.getElementById('resetDigit3').value;
            const d4 = document.getElementById('resetDigit4').value;
            
            const enteredPassword = d1 + d2 + d3 + d4;
            
            if (enteredPassword === PARENT_PASSWORD) {
                if (confirm('Точно удалить все оценки?')) {
                    ratings = [];
                    localStorage.removeItem(STORAGE_KEY);
                    updateDisplay();
                    hideResetModal();
                    
                    if (window.navigator && window.navigator.vibrate) {
                        window.navigator.vibrate(50);
                    }
                }
            } else {
                document.getElementById('resetPasswordError').textContent = 'Неверный пароль';
                for (let i = 1; i <= 4; i++) {
                    document.getElementById(`resetDigit${i}`).value = '';
                }
                document.getElementById('resetDigit1').focus();
            }
        }
        
        // Проверка и конвертация снежинок в звезды
        function checkAndConvertSnowflakes() {
            let snowflakes = ratings.filter(r => r.type === 'snowflake').length;
            
            while (snowflakes >= SNOWFLAKES_TO_STAR) {
                // Удаляем 5 снежинок (самые старые)
                let removed = 0;
                ratings = ratings.filter(r => {
                    if (r.type === 'snowflake' && removed < SNOWFLAKES_TO_STAR) {
                        removed++;
                        return false;
                    }
                    return true;
                });
                
                // Добавляем 1 звезду с пометкой о конвертации
                ratings.push({
                    type: 'star',
                    note: '🎉 Автоматическая конвертация: 5 снежинок → 1 звезда',
                    timestamp: new Date().toISOString(),
                    id: Date.now() + Math.random(),
                    isConversion: true
                });
                
                snowflakes = ratings.filter(r => r.type === 'snowflake').length;
            }
        }
        
        // Обновление экрана
        function updateDisplay() {
            const starCount = ratings.filter(r => r.type === 'star').length;
            const snowflakeCount = ratings.filter(r => r.type === 'snowflake').length;
            
            document.getElementById('starCount').textContent = starCount;
            document.getElementById('snowflakeCount').textContent = snowflakeCount;
            document.getElementById('totalCount').textContent = ratings.length + ' всего';
            
            // Прогресс до следующей звезды
            const progress = (snowflakeCount % SNOWFLAKES_TO_STAR) / SNOWFLAKES_TO_STAR * 100;
            document.getElementById('snowflakeProgress').style.width = progress + '%';
            
            // История
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '';
            
            if (ratings.length === 0) {
                historyList.innerHTML = '<div class="empty-history">✨ Пока нет оценок</div>';
                return;
            }
            
            [...ratings].reverse().forEach(rating => {
                const date = new Date(rating.timestamp);
                const timeStr = date.toLocaleString('ru', { 
                    hour: '2-digit', 
                    minute: '2-digit',
                    day: 'numeric',
                    month: 'short'
                });
                
                const item = document.createElement('div');
                item.className = 'history-item';
                
                let typeText = rating.type === 'star' ? 'Звездочка' : 'Снежинка';
                let emoji = rating.type === 'star' ? '⭐' : '❄️';
                
                let conversionBadge = rating.isConversion ? '<span class="history-conversion">конвертация</span>' : '';
                
                item.innerHTML = `
                    <div class="history-header">
                        <span class="history-emoji">${emoji}</span>
                        <span class="history-type">${typeText}</span>
                        ${conversionBadge}
                        <span class="history-time">${timeStr}</span>
                    </div>
                    <div class="history-note">${rating.note || '—'}</div>
                `;
                
                historyList.appendChild(item);
            });
        }
        
        // Закрытие модалок по клику на фон
        document.getElementById('ratingModal').addEventListener('click', function(e) {
            if (e.target === this) {
                hideRatingModal();
            }
        });
        
        document.getElementById('resetModal').addEventListener('click', function(e) {
            if (e.target === this) {
                hideResetModal();
            }
        });
        
        // Запуск
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
